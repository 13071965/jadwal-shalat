<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Shalat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  height:100vh;
  overflow:hidden;

  /* 🔥 fallback warna kalau gambar gagal */
  background:#111;
}

/* BACKGROUND SIMPLE (NO SLIDESHOW) */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-image:url("https://picsum.photos/1920/1080");
  background-size:cover;
  background-position:center;
  z-index:-2;
}

/* overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* CONTAINER */
.container{
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  gap:10px;
  padding:20px;
}

/* FONT */
h1{
  font-size:min(10vw, 90px);
}

.small{
  font-size:min(3vw, 24px);
}

.green{
  font-size:min(3.2vw, 26px);
  color:#00ff88;
}

.jadwal{
  font-size:min(3vw, 24px);
  line-height:1.5;
}

.active{
  color:#00ff88;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

  <div class="small">JADWAL SHALAT</div>

  <h1 id="jam"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>

  <div class="jadwal" id="jadwal"></div>

</div>

<script>

/* JAM */
setInterval(()=>{
  document.getElementById("jam").innerText=
    new Date().toLocaleTimeString("id-ID");
},1000);

/* TANGGAL */
document.getElementById("tanggal").innerText=
  new Date().toLocaleDateString("id-ID",
  {weekday:'long',day:'numeric',month:'long',year:'numeric'});

/* HIJRI */
try{
  let h=new Intl.DateTimeFormat(
    'id-TN-u-ca-islamic',
    {day:'numeric',month:'long',year:'numeric'}
  ).format(new Date());
  document.getElementById("hijri").innerText=h+" H";
}catch{}

/* CUACA */
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.6&longitude=98.6&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("cuaca").innerText=
    d.current_weather.temperature+"°C - Medan";
});

/* JADWAL */
let jadwal={
  Subuh:"05:06",
  Dzuhur:"12:28",
  Ashar:"15:35",
  Maghrib:"18:33",
  Isya:"19:42"
};

setInterval(()=>{
  let now=new Date();
  let nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  let nextName="";
  let nextTime=0;
  let html="";

  for(let k in jadwal){
    let [h,m]=jadwal[k].split(":");
    let sec=h*3600+m*60;

    if(sec>nowSec && nextName===""){
      nextName=k;
      nextTime=sec;
    }

    html+=`<div class="${k===nextName?'active':''}">
      ${k} - ${jadwal[k]}
    </div>`;
  }

  if(nextName===""){
    nextName="Subuh";
    nextTime=86400 + (5*3600+6*60);
  }

  let sisa=nextTime-nowSec;
  if(sisa<0) sisa+=86400;

  let j=Math.floor(sisa/3600);
  let m=Math.floor((sisa%3600)/60);
  let d=sisa%60;

  document.getElementById("countdown").innerText=
    "Menuju "+nextName+": "+j+"j "+m+"m "+d+"d";

  document.getElementById("jadwal").innerHTML=html;

},1000);

</script>

</body>
</html>
