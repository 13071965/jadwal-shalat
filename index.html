<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:#111;
}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url("https://picsum.photos/1280/720") center/cover no-repeat;
  z-index:-1;
}

.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

h1{font-size:60px;margin:10px;}
.small{font-size:20px;}
.green{color:#00ff88;font-size:22px;margin:10px;}
</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="small">JADWAL SHALAT</div>
<h1 id="jam">--:--:--</h1>

<div class="small" id="tanggal"></div>
<div class="small">Cinta Damai, Medan Helvetia</div>
<div class="small">Medan</div>

<div class="green" id="countdown"></div>

<div id="jadwal"></div>

</div>

<script>

/* JAM SIMPLE */
function updateJam(){
  var now=new Date();

  var h=now.getHours().toString().padStart(2,'0');
  var m=now.getMinutes().toString().padStart(2,'0');
  var s=now.getSeconds().toString().padStart(2,'0');

  document.getElementById("jam").innerHTML=h+"."+m+"."+s;

  document.getElementById("tanggal").innerHTML=
    now.toDateString();
}

setInterval(updateJam,1000);


/* JADWAL */
var jadwal={
  "Subuh":"05:06",
  "Dzuhur":"12:28",
  "Ashar":"15:35",
  "Maghrib":"18:33",
  "Isya":"19:42"
};

function updateJadwal(){

  var now=new Date();
  var nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  var nextName="";
  var nextTime=0;
  var html="";

  for(var k in jadwal){

    var t=jadwal[k].split(":");
    var sec=parseInt(t[0])*3600+parseInt(t[1])*60;

    if(sec>nowSec && nextName===""){
      nextName=k;
      nextTime=sec;
    }

    html+="<div>"+k+" - "+jadwal[k]+"</div>";
  }

  if(nextName===""){
    nextName="Subuh";
    nextTime=86400 + (5*3600+6*60);
  }

  var sisa=nextTime-nowSec;
  if(sisa<0) sisa+=86400;

  var j=Math.floor(sisa/3600);
  var m=Math.floor((sisa%3600)/60);

  document.getElementById("countdown").innerHTML=
    "Menuju "+nextName+": "+j+"j "+m+"m";

  document.getElementById("jadwal").innerHTML=html;
}

setInterval(updateJadwal,1000);

</script>

</body>
</html>
