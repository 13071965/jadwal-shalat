<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 2s ease-in-out;
}

#bg1 { z-index: -2; }
#bg2 { z-index: -3; }

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
}

.content {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

h1 {
  font-size: 80px;
  margin: 0;
}

.small {
  font-size: 24px;
}

.jadwal {
  margin-top: 20px;
  font-size: 22px;
}

.green {
  color: #00ffaa;
  margin-top: 10px;
}

* {
  text-shadow: 0 0 10px rgba(0,0,0,0.8);
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div class="content">
  <div class="small">JADWAL SHALAT</div>
  <h1 id="clock"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>

  <div class="jadwal" id="jadwal"></div>
</div>

<script>

// ================== JAM ==================
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("id-ID");
}
setInterval(updateClock, 1000);
updateClock();

// ================== TANGGAL ==================
function updateTanggal() {
  const now = new Date();
  document.getElementById("tanggal").innerText =
    now.toLocaleDateString("id-ID", {
      weekday: "long",
      day: "numeric",
      month: "long",
      year: "numeric"
    });
}
updateTanggal();

// ================== HIJRI (FIX DOUBLE H) ==================
async function getHijri() {
  const res = await fetch("https://api.aladhan.com/v1/gToH");
  const data = await res.json();
  const h = data.data.hijri;

  document.getElementById("hijri").innerText =
    `${h.day} ${h.month.en} ${h.year} H`;
}
getHijri();

// ================== JADWAL SHALAT ==================
async function getJadwal() {
  const res = await fetch(
    "https://api.aladhan.com/v1/timingsByCity?city=Medan&country=Indonesia"
  );
  const data = await res.json();
  const t = data.data.timings;

  document.getElementById("jadwal").innerHTML = `
    Subuh - ${t.Fajr}<br>
    Dzuhur - ${t.Dhuhr}<br>
    Ashar - ${t.Asr}<br>
    Maghrib - ${t.Maghrib}<br>
    Isya - ${t.Isha}
  `;
}
getJadwal();

// ================== BACKGROUND OTOMATIS ==================

// Ambil semua nama file (karena GitHub tidak bisa auto list folder,
// kita buat manual generate 1–165 sesuai file Anda)

let images = [];
for (let i = 1; i <= 165; i++) {
  images.push(`bg (${i}).jpg`);
}

// Sort berdasarkan angka biar rapi
images.sort((a, b) => {
  const numA = parseInt(a.match(/\d+/));
  const numB = parseInt(b.match(/\d+/));
  return numA - numB;
});

// Slideshow halus
let index = 0;
let active = true;

function changeBackground() {
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");

  const nextImage = images[index];

  if (active) {
    bg2.style.backgroundImage = `url('${nextImage}')`;
    bg2.style.opacity = 1;
    bg1.style.opacity = 0;
  } else {
    bg1.style.backgroundImage = `url('${nextImage}')`;
    bg1.style.opacity = 1;
    bg2.style.opacity = 0;
  }

  active = !active;
  index = (index + 1) % images.length;
}

// start
changeBackground();
setInterval(changeBackground, 10000); // 10 detik

</script>

</body>
</html>
