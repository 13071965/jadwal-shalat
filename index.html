<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
:root{
  --scale: 1.8; /* otomatis besar untuk TV */
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 2s ease-in-out;
  opacity: 0;
}

#bg1 { z-index: -2; }
#bg2 { z-index: -3; }

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

.content {
  position: absolute;
  width: 100%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(var(--scale));
  text-align: center;
}

/* FONT */
h1 { font-size: 100px; margin: 0; }
.small { font-size: 30px; }
.jadwal { font-size: 30px; line-height: 1.8; }
.active { font-size: 34px; color: #00ff88; font-weight: bold; }
.green { font-size: 36px; color: #00ffaa; margin-top: 10px; }

* { text-shadow: 0 0 15px rgba(0,0,0,0.9); }
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div class="content">
  <div class="small">JADWAL SHALAT</div>
  <h1 id="clock"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>
  <div class="jadwal" id="jadwal"></div>
</div>

<script>

// ================= FULLSCREEN AUTO =================
document.documentElement.requestFullscreen?.().catch(()=>{});

// ================= ANTI SCREENSAVER =================
setInterval(()=>{
  window.dispatchEvent(new Event('mousemove'));
},20000);

// ================= JAM =================
setInterval(()=>{
  clock.innerText = new Date().toLocaleTimeString("id-ID");
},1000);

// ================= TANGGAL =================
tanggal.innerText =
  new Date().toLocaleDateString("id-ID", {
    weekday:"long", day:"numeric", month:"long", year:"numeric"
  });

// ================= HIJRI =================
fetch("https://api.aladhan.com/v1/gToH")
.then(r=>r.json())
.then(d=>{
  const h = d.data.hijri;
  hijri.innerText = `${h.day} ${h.month.en} ${h.year} H`;
});

// ================= CUACA =================
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.5952&longitude=98.6722&current_weather=true")
.then(r=>r.json())
.then(d=>{
  cuaca.innerText = `${d.current_weather.temperature}°C - Medan`;
});

// ================= JADWAL =================
let jadwal={};

fetch("https://api.aladhan.com/v1/timingsByCity?city=Medan&country=Indonesia")
.then(r=>r.json())
.then(d=>{
  const t=d.data.timings;
  jadwal={
    Subuh:t.Fajr,
    Dzuhur:t.Dhuhr,
    Ashar:t.Asr,
    Maghrib:t.Maghrib,
    Isya:t.Isha
  };
});

// ================= RENDER =================
function render(){
  if(!Object.keys(jadwal).length) return;

  let html="";
  for(const [n,t] of Object.entries(jadwal)){
    html+=`<div>${n} - ${t}</div>`;
  }
  jadwalEl.innerHTML=html;
}

setInterval(()=>{
  render();
},1000);

// ================= COUNTDOWN =================
setInterval(()=>{
  if(!Object.keys(jadwal).length) return;

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  let nextName="";
  let nextTime=null;

  for(const [n,t] of Object.entries(jadwal)){
    const [h,m]=t.split(":").map(Number);
    const total=h*60+m;

    if(total>nowMin){
      nextName=n;
      nextTime=new Date();
      nextTime.setHours(h,m,0);
      break;
    }
  }

  if(!nextTime){
    const [h,m]=jadwal.Subuh.split(":").map(Number);
    nextTime=new Date();
    nextTime.setDate(nextTime.getDate()+1);
    nextTime.setHours(h,m,0);
    nextName="Subuh";
  }

  const diff=nextTime-now;

  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);

  countdown.innerText=`Menuju ${nextName}: ${h}j ${m}m ${s}d`;

},1000);

// ================= BACKGROUND =================
let images=[];
for(let i=1;i<=165;i++){
  images.push(`bg (${i}).jpg`);
}

let i=0,show=true;

function bg(){
  let b1=bg1,b2=bg2;

  if(show){
    b2.style.backgroundImage=`url('${images[i]}')`;
    b2.style.opacity=1;
    b1.style.opacity=0;
  }else{
    b1.style.backgroundImage=`url('${images[i]}')`;
    b1.style.opacity=1;
    b2.style.opacity=0;
  }

  show=!show;
  i=(i+1)%images.length;
}

bg();
setInterval(bg,15000);

</script>

</body>
</html>
