<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  overflow: hidden;
}

.bg {
  position: fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  z-index:-1;
}

.overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
}

.container {
  text-align:center;
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
}

.clock {
  font-size:100px;
  font-weight:bold;
}

.info {
  font-size:22px;
  margin-top:5px;
}

.jadwal {
  margin-top:20px;
  font-size:24px;
  line-height:1.8;
}

.active {
  color:#00eaff;
  font-weight:bold;
}

.progress {
  width:300px;
  height:6px;
  background:#555;
  margin:20px auto;
  border-radius:5px;
  overflow:hidden;
}

.bar {
  height:100%;
  width:0%;
  background:#00ffaa;
}
</style>
</head>

<body>

<div id="bg" class="bg"></div>
<div class="overlay"></div>

<div class="container">
  <div class="clock" id="clock"></div>
  <div class="info" id="info"></div>

  <div class="jadwal" id="jadwal"></div>

  <div class="info" id="countdown"></div>
  <div class="progress"><div id="bar" class="bar"></div></div>
</div>

<script>

// ===== JAM =====
setInterval(()=>{
  clock.innerText=new Date().toLocaleTimeString("id-ID");
},1000);

// ===== INFO =====
setInterval(()=>{
  const d=new Date();
  info.innerText=d.toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
},60000);

// ===== JADWAL API =====
let jadwal={};

fetch("https://api.aladhan.com/v1/timings?latitude=3.5952&longitude=98.6722&method=11&school=0")
.then(r=>r.json())
.then(d=>{
  const t=d.data.timings;
  jadwal={
    Subuh:t.Fajr,
    Dzuhur:t.Dhuhr,
    Ashar:t.Asr,
    Maghrib:t.Maghrib,
    Isya:t.Isha
  };
});

// ===== RENDER =====
function render(){
  if(!Object.keys(jadwal).length) return;

  const now=new Date();
  const nowMin=now.getHours()*60+now.getMinutes();

  let html="";
  let nextTime=null;
  let prevTime=null;

  const list=Object.entries(jadwal);

  for(let i=0;i<list.length;i++){
    const [n,t]=list[i];
    const [h,m]=t.split(":").map(Number);
    const total=h*60+m;

    if(total>nowMin && !nextTime){
      nextTime={n,t,total};
      prevTime=list[i-1];
    }

    html+=`<div>${n} ${t}</div>`;
  }

  jadwalEl.innerHTML=html;

  // countdown
  if(nextTime){
    const target=new Date();
    const [h,m]=nextTime.t.split(":");
    target.setHours(h,m,0);

    const diff=target-now;
    const s=Math.floor(diff/1000)%60;
    const mnt=Math.floor(diff/60000)%60;
    const hr=Math.floor(diff/3600000);

    countdown.innerText=`${nextTime.n} dalam ${hr}j ${mnt}m ${s}d`;

    // progress bar
    if(prevTime){
      const [ph,pm]=prevTime[1].split(":").map(Number);
      const prevMin=ph*60+pm;

      const totalRange=nextTime.total-prevMin;
      const currentRange=nowMin-prevMin;

      let percent=(currentRange/totalRange)*100;
      if(percent<0) percent=0;
      if(percent>100) percent=100;

      bar.style.width=percent+"%";
    }
  }

}

setInterval(render,1000);

// ===== BACKGROUND SLIDESHOW =====
let imgs=[];
for(let i=1;i<=165;i++) imgs.push(`bg (${i}).jpg`);

let i=0;
setInterval(()=>{
  bg.style.backgroundImage=`url('${imgs[i]}')`;
  i=(i+1)%imgs.length;
},15000);

bg.style.backgroundImage=`url('${imgs[0]}')`;

</script>

</body>
</html>
