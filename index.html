<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
}

/* background layer */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 2s ease-in-out;
  opacity: 0;
}

#bg1 { z-index: -2; }
#bg2 { z-index: -3; }

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

.content {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  text-align: center;
}

h1 {
  font-size: 80px;
  margin: 0;
}

.small { font-size: 24px; }

.jadwal {
  margin-top: 20px;
  font-size: 22px;
}

.green {
  color: #00ffaa;
  margin-top: 10px;
  font-size: 26px;
}

* {
  text-shadow: 0 0 15px rgba(0,0,0,0.9);
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div class="content">
  <div class="small">JADWAL SHALAT</div>
  <h1 id="clock"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>

  <div class="jadwal" id="jadwal"></div>
</div>

<script>

// ================= JAM =================
function updateClock() {
  const now = new Date();
  document.getElementById("clock").innerText =
    now.toLocaleTimeString("id-ID");
}
setInterval(updateClock, 1000);
updateClock();

// ================= TANGGAL =================
document.getElementById("tanggal").innerText =
  new Date().toLocaleDateString("id-ID", {
    weekday: "long",
    day: "numeric",
    month: "long",
    year: "numeric"
  });

// ================= HIJRI =================
fetch("https://api.aladhan.com/v1/gToH")
  .then(r => r.json())
  .then(d => {
    const h = d.data.hijri;
    document.getElementById("hijri").innerText =
      `${h.day} ${h.month.en} ${h.year} H`;
  });

// ================= CUACA =================
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.5952&longitude=98.6722&current_weather=true")
  .then(r => r.json())
  .then(d => {
    document.getElementById("cuaca").innerText =
      `${d.current_weather.temperature}°C - Medan`;
  });

// ================= JADWAL =================
let jadwalGlobal = null;

fetch("https://api.aladhan.com/v1/timingsByCity?city=Medan&country=Indonesia")
  .then(r => r.json())
  .then(d => {
    const t = d.data.timings;

    jadwalGlobal = {
      Subuh: t.Fajr,
      Dzuhur: t.Dhuhr,
      Ashar: t.Asr,
      Maghrib: t.Maghrib,
      Isya: t.Isha
    };

    document.getElementById("jadwal").innerHTML = `
      Subuh - ${t.Fajr}<br>
      Dzuhur - ${t.Dhuhr}<br>
      Ashar - ${t.Asr}<br>
      Maghrib - ${t.Maghrib}<br>
      Isya - ${t.Isha}
    `;
  });

// ================= COUNTDOWN =================
function updateCountdown() {
  if (!jadwalGlobal) return;

  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  let nextName = "";
  let nextTime = null;

  for (const [name, time] of Object.entries(jadwalGlobal)) {
    const [h, m] = time.split(":").map(Number);
    const total = h*60 + m;

    if (total > nowMin) {
      nextName = name;
      nextTime = new Date();
      nextTime.setHours(h, m, 0);
      break;
    }
  }

  if (!nextTime) {
    const [h, m] = jadwalGlobal.Subuh.split(":").map(Number);
    nextTime = new Date();
    nextTime.setDate(nextTime.getDate()+1);
    nextTime.setHours(h, m, 0);
    nextName = "Subuh";
  }

  const diff = nextTime - now;

  const h = Math.floor(diff/3600000);
  const m = Math.floor((diff%3600000)/60000);
  const s = Math.floor((diff%60000)/1000);

  document.getElementById("countdown").innerText =
    `Menuju ${nextName}: ${h}j ${m}m ${s}d`;
}
setInterval(updateCountdown, 1000);

// ================= BACKGROUND FIX NO FLASH =================

// daftar gambar
let images = [];
for (let i = 1; i <= 165; i++) {
  images.push(`bg (${i}).jpg`);
}

// urutkan angka
images.sort((a,b)=>parseInt(a.match(/\d+/))-parseInt(b.match(/\d+/)));

let index = 0;
let showingBg1 = true;

// preload 3 gambar ke depan (ANTI PUTIH TOTAL)
function preloadBatch(start) {
  for (let i = 0; i < 3; i++) {
    const img = new Image();
    img.src = images[(start + i) % images.length];
  }
}

function changeBg() {
  const bg1 = document.getElementById("bg1");
  const bg2 = document.getElementById("bg2");

  const next = images[index];

  // preload sebelum tampil
  const img = new Image();
  img.src = next;

  img.onload = () => {
    if (showingBg1) {
      bg2.style.backgroundImage = `url('${next}')`;
      bg2.style.opacity = 1;
      bg1.style.opacity = 0;
    } else {
      bg1.style.backgroundImage = `url('${next}')`;
      bg1.style.opacity = 1;
      bg2.style.opacity = 0;
    }

    showingBg1 = !showingBg1;
    index = (index + 1) % images.length;

    preloadBatch(index); // preload berikutnya
  };
}

// start
changeBg();
setInterval(changeBg, 15000);

</script>

</body>
</html>
