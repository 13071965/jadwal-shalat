<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat</title>

<style>
:root{
  --scale: 1.5; /* 👉 ubah ini kalau mau lebih besar/kecil */
}

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial, sans-serif;
  color: white;
  background: black;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  transition: opacity 2s ease-in-out;
  opacity: 0;
}

#bg1 { z-index: -2; }
#bg2 { z-index: -3; }

.overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.35);
}

.content {
  position: absolute;
  width: 100%;
  top: 50%;
  transform: translateY(-50%) scale(var(--scale));
  text-align: center;
}

/* ================= FONT ================= */

h1 { 
  font-size: 90px; 
  margin: 0;
  font-weight: bold;
}

.small { 
  font-size: 28px; 
}

.jadwal {
  margin-top: 25px;
  font-size: 26px;
  line-height: 1.8;
}

.active {
  color: #00ff88;
  font-weight: bold;
  font-size: 30px;
}

.green {
  color: #00ffaa;
  margin-top: 15px;
  font-size: 32px;
  font-weight: bold;
}

* { 
  text-shadow: 0 0 15px rgba(0,0,0,0.9); 
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div class="content">
  <div class="small">JADWAL SHALAT</div>
  <h1 id="clock"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>

  <div class="jadwal" id="jadwal"></div>
</div>

<script>

// ================= JAM =================
setInterval(()=>{
  document.getElementById("clock").innerText =
    new Date().toLocaleTimeString("id-ID");
},1000);

// ================= TANGGAL =================
document.getElementById("tanggal").innerText =
  new Date().toLocaleDateString("id-ID", {
    weekday:"long", day:"numeric", month:"long", year:"numeric"
  });

// ================= HIJRI =================
fetch("https://api.aladhan.com/v1/gToH")
.then(r=>r.json())
.then(d=>{
  const h = d.data.hijri;

  let bulan = h.month.en;

  bulan = bulan
    .replace("Shawwal","Syawal")
    .replace("Sha'ban","Syaban")
    .replace("Ramadan","Ramadhan")
    .replace("Dhu al-Hijjah","Zulhijjah")
    .replace("Dhu al-Qi'dah","Zulkaidah");

  document.getElementById("hijri").innerText =
    `${h.day} ${bulan} ${h.year} H`;
});

// ================= CUACA =================
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.5952&longitude=98.6722&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("cuaca").innerText =
    `${d.current_weather.temperature}°C - Medan`;
})
.catch(()=>{
  document.getElementById("cuaca").innerText = "Medan";
});

// ================= JADWAL =================
let jadwal = {};

fetch("https://api.aladhan.com/v1/timingsByCity?city=Medan&country=Indonesia")
.then(r=>r.json())
.then(d=>{
  const t = d.data.timings;

  jadwal = {
    Subuh:t.Fajr,
    Dzuhur:t.Dhuhr,
    Ashar:t.Asr,
    Maghrib:t.Maghrib,
    Isya:t.Isha
  };
});

// ================= RENDER =================
function renderJadwal(){

  if(Object.keys(jadwal).length===0) return;

  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  let active = "";

  const list = Object.entries(jadwal);

  for(let i=0;i<list.length;i++){
    const [name,time] = list[i];
    const [h,m] = time.split(":").map(Number);
    const tMin = h*60 + m;

    let nextMin = 1440;

    if(list[i+1]){
      const [nh,nm] = list[i+1][1].split(":").map(Number);
      nextMin = nh*60 + nm;
    }

    if(nowMin >= tMin && nowMin < nextMin){
      active = name;
    }
  }

  let html = "";

  for(const [name,time] of Object.entries(jadwal)){
    if(name === active){
      html += `<div class="active">${name} - ${time}</div>`;
    } else {
      html += `<div>${name} - ${time}</div>`;
    }
  }

  document.getElementById("jadwal").innerHTML = html;
}

setInterval(renderJadwal,1000);

// ================= COUNTDOWN =================
setInterval(()=>{
  if(Object.keys(jadwal).length===0) return;

  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();

  let nextName="";
  let nextTime=null;

  for(const [n,t] of Object.entries(jadwal)){
    const [h,m]=t.split(":").map(Number);
    const total=h*60+m;

    if(total>nowMin){
      nextName=n;
      nextTime=new Date();
      nextTime.setHours(h,m,0);
      break;
    }
  }

  if(!nextTime){
    const [h,m]=jadwal.Subuh.split(":").map(Number);
    nextTime=new Date();
    nextTime.setDate(nextTime.getDate()+1);
    nextTime.setHours(h,m,0);
    nextName="Subuh";
  }

  const diff=nextTime-now;

  const h=Math.floor(diff/3600000);
  const m=Math.floor((diff%3600000)/60000);
  const s=Math.floor((diff%60000)/1000);

  document.getElementById("countdown").innerText =
    `Menuju ${nextName}: ${h}j ${m}m ${s}d`;

},1000);

// ================= BACKGROUND =================
let images=[];
for(let i=1;i<=165;i++){
  images.push(`bg (${i}).jpg`);
}

images.sort((a,b)=>parseInt(a.match(/\d+/))-parseInt(b.match(/\d+/)));

let i=0;
let show1=true;

function gantiBG(){
  const bg1=document.getElementById("bg1");
  const bg2=document.getElementById("bg2");

  const img=new Image();
  img.src=images[i];

  img.onload=()=>{
    if(show1){
      bg2.style.backgroundImage=`url('${images[i]}')`;
      bg2.style.opacity=1;
      bg1.style.opacity=0;
    }else{
      bg1.style.backgroundImage=`url('${images[i]}')`;
      bg1.style.opacity=1;
      bg2.style.opacity=0;
    }

    show1=!show1;
    i=(i+1)%images.length;
  };
}

gantiBG();
setInterval(gantiBG,15000);

</script>

</body>
</html>
