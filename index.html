<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Jadwal Shalat Display</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  overflow:hidden;
  font-family:Arial;
  color:white;
  background:black;
  cursor:none;
}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:opacity 2s ease-in-out;
}

#bg1{z-index:-2; opacity:1;}
#bg2{z-index:-3; opacity:0;}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
}

.content{
  position:absolute;
  width:100%;
  top:50%;
  transform:translateY(-50%);
  text-align:center;
}

h1{font-size:10vw;margin:0;}
.small{font-size:3vw;}
.jadwal{font-size:2.8vw;margin-top:20px;line-height:1.8;}
.active{color:#00ff88;font-weight:bold;font-size:3vw;}
.green{color:#00ffaa;font-size:3vw;margin-top:10px;}

*{text-shadow:0 0 20px rgba(0,0,0,1);}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg"></div>

<div class="overlay"></div>

<div class="content">
<div class="small">JADWAL SHALAT</div>
<h1 id="clock"></h1>
<div class="small" id="tanggal"></div>
<div class="small" id="hijri"></div>
<div class="small">Cinta Damai, Medan Helvetia</div>
<div class="small" id="cuaca"></div>
<div class="green" id="countdown"></div>
<div class="jadwal" id="jadwal"></div>
</div>

<script>

// ================= TAP 1x FULLSCREEN =================
function goFull(){
  let el=document.documentElement;
  if(el.requestFullscreen){
    el.requestFullscreen().catch(()=>{});
  }
}
document.addEventListener("click", goFull);
document.addEventListener("touchstart", goFull);

// ================= JAM =================
setInterval(()=>{
  clock.innerText=new Date().toLocaleTimeString("id-ID");
},1000);

// ================= TANGGAL =================
tanggal.innerText=new Date().toLocaleDateString("id-ID",
{weekday:"long",day:"numeric",month:"long",year:"numeric"});

// ================= HIJRI =================
fetch("https://api.aladhan.com/v1/gToH")
.then(r=>r.json())
.then(d=>{
  let h=d.data.hijri;
  let bulan=h.month.en.replace("Shawwal","Syawal");
  hijri.innerText=`${h.day} ${bulan} ${h.year} H`;
});

// ================= CUACA =================
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.5952&longitude=98.6722&current_weather=true")
.then(r=>r.json())
.then(d=>{
  cuaca.innerText=`${d.current_weather.temperature}°C - Medan`;
})
.catch(()=>{
  cuaca.innerText="Medan";
});

// ================= JADWAL =================
let jadwal={};

fetch("https://api.aladhan.com/v1/timingsByCity?city=Medan&country=Indonesia")
.then(r=>r.json())
.then(d=>{
  let t=d.data.timings;
  jadwal={
    Subuh:t.Fajr,
    Dzuhur:t.Dhuhr,
    Ashar:t.Asr,
    Maghrib:t.Maghrib,
    Isya:t.Isha
  };
});

// ================= HIGHLIGHT =================
setInterval(()=>{
if(Object.keys(jadwal).length===0)return;

let now=new Date();
let nowMin=now.getHours()*60+now.getMinutes();

let active="";
let list=Object.entries(jadwal);

for(let i=0;i<list.length;i++){
 let [n,t]=list[i];
 let [h,m]=t.split(":").map(Number);
 let cur=h*60+m;

 let next=1440;
 if(list[i+1]){
  let [nh,nm]=list[i+1][1].split(":").map(Number);
  next=nh*60+nm;
 }

 if(nowMin>=cur&&nowMin<next)active=n;
}

let html="";
for(let [n,t] of Object.entries(jadwal)){
 html+= n===active
 ? `<div class="active">${n} - ${t}</div>`
 : `<div>${n} - ${t}</div>`;
}

jadwal.innerHTML=html;

},1000);

// ================= COUNTDOWN =================
setInterval(()=>{
if(Object.keys(jadwal).length===0)return;

let now=new Date();
let nowMin=now.getHours()*60+now.getMinutes();

let nextName="",nextTime=null;

for(let [n,t] of Object.entries(jadwal)){
 let [h,m]=t.split(":").map(Number);
 let total=h*60+m;

 if(total>nowMin){
  nextName=n;
  nextTime=new Date();
  nextTime.setHours(h,m,0);
  break;
 }
}

if(!nextTime){
 let [h,m]=jadwal.Subuh.split(":").map(Number);
 nextTime=new Date();
 nextTime.setDate(nextTime.getDate()+1);
 nextTime.setHours(h,m,0);
 nextName="Subuh";
}

let diff=nextTime-now;

let h=Math.floor(diff/3600000);
let m=Math.floor((diff%3600000)/60000);
let s=Math.floor((diff%60000)/1000);

countdown.innerText=`Menuju ${nextName}: ${h}j ${m}m ${s}d`;

},1000);

// ================= BACKGROUND SUPER HALUS =================
let images=[];
for(let i=1;i<=165;i++){
 images.push(`bg (${i}).jpg`);
}

images.sort((a,b)=>parseInt(a.match(/\d+/))-parseInt(b.match(/\d+/)));

let i=0;
let front=true;

// preload awal
for(let j=0;j<8;j++){
 new Image().src=images[j];
}

// set awal
bg1.style.backgroundImage=`url('${images[0]}')`;

function changeBG(){
 let next=images[i];
 let img=new Image();
 img.src=next;

 img.onload=()=>{
  if(front){
    bg2.style.backgroundImage=`url('${next}')`;
    bg2.style.opacity=1;
    setTimeout(()=>bg1.style.opacity=0,50);
  }else{
    bg1.style.backgroundImage=`url('${next}')`;
    bg1.style.opacity=1;
    setTimeout(()=>bg2.style.opacity=0,50);
  }

  front=!front;
  i=(i+1)%images.length;
 };
}

setInterval(changeBG,15000);

</script>

</body>
</html>
