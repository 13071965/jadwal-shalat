<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jadwal Shalat</title>

<style>
body {
  margin: 0;
  padding: 0;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  background-size: cover;
  background-position: center;
  transition: background-image 2s ease-in-out;
  background-color: black;
}

.container {
  margin-top: 10%;
}

.jam {
  font-size: 80px;
  font-weight: bold;
}

.kecil {
  font-size: 20px;
  margin-top: 10px;
}

.hijau {
  color: #00ff88;
  font-size: 22px;
  margin-top: 10px;
}

.jadwal {
  margin-top: 20px;
  font-size: 22px;
}
</style>
</head>

<body>

<div class="container">
  <div>JADWAL SHALAT</div>
  <div class="jam" id="jam">00:00:00</div>

  <div class="kecil" id="tanggal"></div>
  <div class="kecil">Cinta Damai, Medan Helvetia</div>

  <div class="hijau" id="countdown"></div>

  <div class="jadwal">
    Subuh - 05:08<br>
    Dzuhur - 12:31<br>
    Ashar - 15:36<br>
    Maghrib - 18:36<br>
    Isya - 19:44
  </div>
</div>

<script>
// ================= JAM =================
function updateJam() {
  let now = new Date();

  let jam = now.toLocaleTimeString("id-ID");
  let tanggal = now.toLocaleDateString("id-ID", {
    weekday: 'long',
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });

  document.getElementById("jam").innerHTML = jam;
  document.getElementById("tanggal").innerHTML = tanggal;
}

setInterval(updateJam, 1000);
updateJam();


// ================= SLIDESHOW =================
// AUTO SUPPORT 165 FOTO TANPA TULIS SATU-SATU
let images = [];

for (let i = 1; i <= 200; i++) {
  images.push(`bg (${i}).jpg`);
}

let index = 0;

function changeBackground() {
  document.body.style.backgroundImage = `url('${images[index]}')`;
  index = (index + 1) % images.length;
}

setInterval(changeBackground, 10000);
changeBackground();


// ================= COUNTDOWN =================
let jadwal = {
  subuh: "05:08",
  dzuhur: "12:31",
  ashar: "15:36",
  maghrib: "18:36",
  isya: "19:44"
};

function getNextPrayer() {
  let now = new Date();
  let today = now.toISOString().split("T")[0];

  for (let key in jadwal) {
    let waktu = new Date(`${today}T${jadwal[key]}`);
    if (waktu > now) {
      return { nama: key, waktu: waktu };
    }
  }

  // kalau lewat semua → ke subuh besok
  let besok = new Date();
  besok.setDate(besok.getDate() + 1);
  let tanggalBesok = besok.toISOString().split("T")[0];

  return {
    nama: "subuh",
    waktu: new Date(`${tanggalBesok}T${jadwal.subuh}`)
  };
}

function updateCountdown() {
  let next = getNextPrayer();
  let now = new Date();

  let diff = next.waktu - now;

  let jam = Math.floor(diff / (1000 * 60 * 60));
  let menit = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
  let detik = Math.floor((diff % (1000 * 60)) / 1000);

  document.getElementById("countdown").innerHTML =
    `Menuju ${next.nama}: ${jam}j ${menit}m ${detik}d`;
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
