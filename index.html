<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Shalat</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial, sans-serif;
  color:white;
  text-align:center;
  height:100vh;
  overflow:hidden;
  background:black;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  transition:opacity 2s;
  z-index:-2;
}

/* overlay */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.4);
  z-index:-1;
}

/* CONTAINER FIX TV */
.container{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  /* 🔥 penting: supaya tidak kepotong */
  transform:scale(0.9);
}

/* FONT */
h1{font-size:7vh;}
.small{font-size:2.2vh;}
.green{font-size:2.2vh;color:#00ff88;}
.jadwal{font-size:2vh;line-height:1.3;}

.active{
  color:#00ff88;
  font-weight:bold;
}
</style>
</head>

<body>

<div id="bg1" class="bg"></div>
<div id="bg2" class="bg" style="opacity:0"></div>
<div class="overlay"></div>

<div class="container">

  <div class="small">JADWAL SHALAT</div>

  <h1 id="jam"></h1>

  <div class="small" id="tanggal"></div>
  <div class="small" id="hijri"></div>
  <div class="small">Cinta Damai, Medan Helvetia</div>
  <div class="small" id="cuaca"></div>

  <div class="green" id="countdown"></div>

  <div class="jadwal" id="jadwal"></div>

</div>

<script>

/* JAM */
setInterval(()=>{
  document.getElementById("jam").innerText=
    new Date().toLocaleTimeString("id-ID");
},1000);

/* TANGGAL */
document.getElementById("tanggal").innerText=
  new Date().toLocaleDateString("id-ID",
  {weekday:'long',day:'numeric',month:'long',year:'numeric'});

/* HIJRI */
try{
  let h=new Intl.DateTimeFormat(
    'id-TN-u-ca-islamic',
    {day:'numeric',month:'long',year:'numeric'}
  ).format(new Date());
  document.getElementById("hijri").innerText=h+" H";
}catch{}

/* CUACA */
fetch("https://api.open-meteo.com/v1/forecast?latitude=3.6&longitude=98.6&current_weather=true")
.then(r=>r.json())
.then(d=>{
  document.getElementById("cuaca").innerText=
    d.current_weather.temperature+"°C - Medan";
});

/* JADWAL */
let jadwal={
  Subuh:"05:06",
  Dzuhur:"12:28",
  Ashar:"15:35",
  Maghrib:"18:33",
  Isya:"19:42"
};

setInterval(()=>{
  let now=new Date();
  let nowSec=now.getHours()*3600+now.getMinutes()*60+now.getSeconds();

  let nextName="";
  let nextTime=0;
  let html="";

  for(let k in jadwal){
    let [h,m]=jadwal[k].split(":");
    let sec=h*3600+m*60;

    if(sec>nowSec && nextName===""){
      nextName=k;
      nextTime=sec;
    }

    html+=`<div class="${k===nextName?'active':''}">
      ${k} - ${jadwal[k]}
    </div>`;
  }

  if(nextName===""){
    nextName="Subuh";
    nextTime=86400 + (5*3600+6*60);
  }

  let sisa=nextTime-nowSec;
  if(sisa<0) sisa+=86400;

  let j=Math.floor(sisa/3600);
  let m=Math.floor((sisa%3600)/60);
  let d=sisa%60;

  document.getElementById("countdown").innerText=
    "Menuju "+nextName+": "+j+"j "+m+"m "+d+"d";

  document.getElementById("jadwal").innerHTML=html;

},1000);

/* BACKGROUND */
let imgs=[
 "https://images.unsplash.com/photo-1507525428034-b723cf961d3e",
 "https://images.unsplash.com/photo-1501785888041-af3ef285b470",
 "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"
];

let i=0;
let bg1=document.getElementById("bg1");
let bg2=document.getElementById("bg2");

bg1.style.backgroundImage=`url(${imgs[0]})`;

function slide(){
  let next=(i+1)%imgs.length;

  bg2.style.backgroundImage=`url(${imgs[next]})`;
  bg2.style.opacity=1;
  bg1.style.opacity=0;

  setTimeout(()=>{
    bg1.style.backgroundImage=`url(${imgs[next]})`;
    bg1.style.opacity=1;
    bg2.style.opacity=0;
    i=next;
  },2000);
}

setInterval(slide,15000);

</script>

</body>
</html>
